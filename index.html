<script>
// ==================== PARALLAX BACKGROUND ====================
// Self-contained subsystem. Exposes ParallaxBg.init(), .update(dt, speed), .draw(ctx, canvasWidth, bgHeight)
const ParallaxBg = (function() {
  // --- Offscreen canvas for the static far-layer sky gradient ---
  let skyCanvas = null;
  let skyCtx = null;

  // --- Layer offsets ---
  let farOffset = 0;   // sky (speed 0.15)
  let midOffset = 0;   // city silhouette (speed 0.4)
  let nearOffset = 0;  // bg.webp (speed 1.0)

  // --- Stored dimensions ---
  let cW = 960;
  let bgH = 540;

  // --- Mid layer: building strip data ---
  let buildings = [];     // { x, w, h }
  let stripWidth = 0;     // total width of building strip (~2x canvas)

  // --- Seeded simple random for deterministic building layout ---
  function seededRand(seed) {
    let s = seed;
    return function() {
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      return (s >>> 0) / 0xffffffff;
    };
  }

  function init(canvasWidth, bgHeight) {
    cW = canvasWidth;
    bgH = bgHeight;

    // --- Build sky gradient onto an offscreen canvas once ---
    skyCanvas = document.createElement('canvas');
    skyCanvas.width = cW;
    skyCanvas.height = bgH;
    skyCtx = skyCanvas.getContext('2d');
    const grad = skyCtx.createLinearGradient(0, 0, 0, bgH);
    grad.addColorStop(0,   '#2a0a1a');  // dark warm purple-maroon at top
    grad.addColorStop(0.5, '#7a2a1a');  // mid deep red
    grad.addColorStop(1,   '#cc6040');  // dusky orange at horizon
    skyCtx.fillStyle = grad;
    skyCtx.fillRect(0, 0, cW, bgH);

    // --- Generate building strip for mid layer ---
    buildings = [];
    const rand = seededRand(42);
    const targetWidth = Math.ceil(cW * 2.2); // ~2x canvas width for seamless wrap
    let curX = 0;
    while (curX < targetWidth) {
      const w = Math.floor(rand() * 40 + 20);   // 20-60px wide
      const h = Math.floor(rand() * 80 + 40);   // 40-120px tall
      buildings.push({ x: curX, w, h });
      curX += w + Math.floor(rand() * 6 + 1);  // small gap between buildings
    }
    stripWidth = curX;

    // Reset offsets
    farOffset = 0;
    midOffset = 0;
    nearOffset = 0;
  }

  function update(dt, speed) {
    // Advance each layer offset; use modulo to wrap seamlessly
    farOffset  = (farOffset  + speed * 0.15 * dt) % cW;
    midOffset  = (midOffset  + speed * 0.4  * dt) % stripWidth;
    nearOffset = (nearOffset + speed * 1.0  * dt) % cW;
  }

  function draw(ctx, canvasWidth, bgHeight) {
    // Guard: if not yet initialised, run init with defaults
    if (!skyCanvas) init(canvasWidth, bgHeight);

    cW = canvasWidth;
    bgH = bgHeight;

    // --- FAR layer: sky gradient (static offscreen canvas, no per-frame gradient) ---
    // Sky doesn't need to scroll horizontally — it's a uniform gradient
    ctx.drawImage(skyCanvas, 0, 0, Math.floor(cW), Math.floor(bgH));

    // --- MID layer: city silhouette buildings ---
    // Buildings are drawn from their strip offset; two passes ensure wrap coverage
    const buildingTop = bgH * 0.6;  // buildings sit in lower 40% of bg area
    ctx.fillStyle = '#1a0a0a';
    const startOff = -Math.floor(midOffset);
    for (let pass = 0; pass < 3; pass++) {
      const passOff = startOff + pass * stripWidth;
      if (passOff > cW) break;
      for (let i = 0; i < buildings.length; i++) {
        const b = buildings[i];
        const bx = Math.floor(b.x + passOff);
        if (bx + b.w < 0) continue;
        if (bx > cW) break;
        // Vary building shade slightly for depth
        const shade = (i % 3 === 0) ? '#1a0a0a' : (i % 3 === 1) ? '#221212' : '#2a1515';
        ctx.fillStyle = shade;
        const bTop = Math.floor(buildingTop + (bgH - buildingTop - b.h));
        ctx.fillRect(bx, bTop, b.w, b.h + 2); // +2 to avoid gap at bottom
      }
    }

    // --- NEAR layer: bg.webp (or fallback gradient) scrolling at full speed ---
    // Access globals bgImage and bgLoaded from the main script (same file)
    if (typeof bgLoaded !== 'undefined' && bgLoaded && typeof bgImage !== 'undefined') {
      ctx.imageSmoothingEnabled = false;
      // Draw twice side-by-side for seamless wrap
      const nx = Math.floor(-nearOffset);
      ctx.drawImage(bgImage, nx,        0, Math.floor(cW), Math.floor(bgH));
      ctx.drawImage(bgImage, nx + Math.floor(cW), 0, Math.floor(cW), Math.floor(bgH));
    } else {
      // Fallback gradient matching existing drawBackground() fallback colors
      const grad = ctx.createLinearGradient(0, 0, 0, bgH);
      grad.addColorStop(0,   '#ff6040');
      grad.addColorStop(0.3, '#ff8855');
      grad.addColorStop(0.6, '#cc7070');
      grad.addColorStop(1,   '#553344');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, Math.floor(cW), Math.floor(bgH));
    }
  }

  return { init, update, draw };
})();
</script>
<script>
// ==================== SCREEN FADE ====================
// Self-contained subsystem for fade transitions between game states.
// Exposes ScreenFade.start(type, duration, callback), .update(dt), .draw(ctx, w, h), .active
const ScreenFade = (function() {
  let _alpha = 0;
  let _timer = 0;
  let _totalDuration = 1;
  let _phase = 'fading-out'; // 'fading-out' | 'fading-in'
  let _midCallback = null;
  let _type = 'out'; // 'out' | 'in' | 'out-in'
  let _active = false;
  let _callbackFired = false;

  // type: 'out' (clear->black), 'in' (black->clear), 'out-in' (clear->black->callback->clear)
  function start(type, duration, callback) {
    _type = type;
    _totalDuration = duration || 30;
    _midCallback = callback || null;
    _callbackFired = false;
    _active = true;

    if (type === 'in') {
      _alpha = 1;
      _timer = _totalDuration;
      _phase = 'fading-in';
    } else {
      _alpha = 0;
      _timer = 0;
      _phase = 'fading-out';
    }
  }

  function update(dt) {
    if (!_active) return;

    if (_phase === 'fading-out') {
      _timer += dt;
      const halfDur = _totalDuration / 2;
      _alpha = Math.min(_timer / halfDur, 1);
      if (_timer >= halfDur) {
        _alpha = 1;
        if (_type === 'out-in') {
          if (!_callbackFired && _midCallback) {
            _callbackFired = true;
            _midCallback();
          }
          _phase = 'fading-in';
          _timer = halfDur;
        } else {
          _active = false;
        }
      }
    } else if (_phase === 'fading-in') {
      _timer -= dt;
      const halfDur = _totalDuration / 2;
      _alpha = Math.max(_timer / halfDur, 0);
      if (_timer <= 0) {
        _alpha = 0;
        _active = false;
      }
    }
  }

  function draw(ctx, w, h) {
    if (!_active || _alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.min(1, Math.max(0, _alpha));
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }

  return {
    get active() { return _active; },
    start,
    update,
    draw
  };
})();
</script>
<script>
// ==================== AUDIO MANAGER ====================
// Wraps Howler.js for SFX and music playback.
// Exposes: init, play, playMusic, stopMusic, setMute, isMuted
const AudioManager = (function() {
  let musicHowl = null;
  let muted = false;
  let initialized = false;

  const SFX = {
    jump:         null,
    collect:      null,
    collision:    null,
    bossHit:      null,
    bossDefeated: null,
    gameOver:     null,
  };

  function init() {
    if (initialized) return;
    initialized = true;

    muted = localStorage.getItem('cavalloMuted') === '1';
    Howler.mute(muted);

    const files = {
      jump:         ['audio/jump.ogg',         'audio/jump.mp3'],
      collect:      ['audio/collect.ogg',       'audio/collect.mp3'],
      collision:    ['audio/collision.ogg',     'audio/collision.mp3'],
      bossHit:      ['audio/boss_hit.ogg',      'audio/boss_hit.mp3'],
      bossDefeated: ['audio/boss_defeated.ogg', 'audio/boss_defeated.mp3'],
      gameOver:     ['audio/game_over.ogg',     'audio/game_over.mp3'],
    };

    for (const [name, src] of Object.entries(files)) {
      SFX[name] = new Howl({ src, volume: 0.6, preload: true });
    }
  }

  function play(name) {
    if (SFX[name]) SFX[name].play();
  }

  function playMusic(track) {
    if (musicHowl) { musicHowl.stop(); musicHowl.unload(); musicHowl = null; }
    const src = track === 'boss'
      ? ['audio/music_boss.ogg', 'audio/music_boss.mp3']
      : ['audio/music_game.ogg', 'audio/music_game.mp3'];
    musicHowl = new Howl({ src, loop: true, volume: 0.4, html5: false });
    musicHowl.play();
  }

  function stopMusic() {
    if (musicHowl) { musicHowl.stop(); }
  }

  function setMute(val) {
    muted = !!val;
    Howler.mute(muted);
    localStorage.setItem('cavalloMuted', muted ? '1' : '0');
  }

  function isMuted() { return muted; }

  return { init, play, playMusic, stopMusic, setMute, isMuted };
})();
</script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ==================== GAME STATE ====================
let GROUND_Y = 540;
const GRAVITY = 0.55;
const JUMP_FORCE = -12;
const HORSE_W = 55;
const HORSE_H = 78;

let gameState = 'menu'; // 'menu', 'playing', 'gameover', 'leaderboard'
let score = 0;
let highScore = parseInt(localStorage.getItem('cavalloHighScore')) || 0;
let speed = 5.0;
let baseSpeed = 5.0;
let frameCount = 0;
let animFrame = 0;
let lastObstacleSpawn = 0;
let menuHover = ''; // 'play', 'recipes', 'intro', 'leaderboard', or ''
let postBossGracePeriod = 0; // grace period after boss defeat
let obstaclesSinceLastBreather = 0; // breather tracking for clusters
let framesSinceLastArancino = 0; // arancino spawn tracking

// ==================== LEADERBOARD ====================
const LEADERBOARD_URL = 'https://script.google.com/macros/s/AKfycbw-cQVuORTcvZciMq1T-3mDI4AFXvALU2jYbpLZmir8I8j0RmG18XVCU97XxPo1MRht/exec';
let playerNickname = localStorage.getItem('cavalloNickname') || '';
let leaderboardData = [];
let leaderboardLoading = false;
let scoreSubmitted = false;
let btnLeaderboard = { x: 0, y: 0, w: 0, h: 0 };
let btnLeaderboardBack = { x: 0, y: 0, w: 0, h: 0 };

// ==================== BACKGROUND IMAGE ====================
const ROAD_HEIGHT = 50; // road drawn below the full image
const bgImage = new Image();
bgImage.src = 'bg.webp';
let bgLoaded = false;
let bgH = 540; // will be set on load
bgImage.onload = () => {
  const maxW = 960;
  let w = bgImage.naturalWidth, h = bgImage.naturalHeight;
  const scale = Math.min(maxW / w, 1);
  const scaledW = Math.floor(w * scale);
  const scaledH = Math.floor(h * scale);
  canvas.width = scaledW;
  canvas.height = scaledH + ROAD_HEIGHT;
  bgH = scaledH;
  GROUND_Y = bgH; // ground line sits right at the bottom of the image
  horse.y = GROUND_Y;
  bgLoaded = true;
  ParallaxBg.init(canvas.width, bgH);
};

// Default canvas before image loads
canvas.width = 960;
canvas.height = 540 + ROAD_HEIGHT;
// Init parallax with default dimensions (will be re-inited on bgImage.onload)
ParallaxBg.init(canvas.width, 540);

// ==================== PIXEL HELPER ====================
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// Text with black outline for readability on any background
function outText(text, x, y, color, font, align) {
  ctx.font = font || ctx.font;
  ctx.textAlign = align || ctx.textAlign;
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#000';
  ctx.lineJoin = 'round';
  ctx.strokeText(text, x, y);
  ctx.fillStyle = color || ctx.fillStyle;
  ctx.fillText(text, x, y);
}

// ==================== WHITE/CREAM HORSE (smaller, s=2) ====================
function drawHorseOutline(baseX, baseY, frame, jumping) {
  // Draw horse silhouette in dark color for outline, then real horse on top
  const offsets = [[-2,0],[2,0],[0,-2],[0,2],[-1,-1],[1,-1],[-1,1],[1,1]];
  ctx.globalAlpha = 0.7;
  for (const [ox, oy] of offsets) {
    drawHorseBody(baseX + ox, baseY + oy, frame, jumping, true);
  }
  ctx.globalAlpha = 1.0;
  drawHorseBody(baseX, baseY, frame, jumping, false);
}

function drawHorseBody(baseX, baseY, frame, jumping, outlineMode) {
  const s = 2;

  // Outline mode: everything is dark
  const body1 = outlineMode ? '#111' : '#f0e8dd';  // cream white
  const body2 = outlineMode ? '#111' : '#e0d4c4';  // warm shadow
  const body3 = outlineMode ? '#111' : '#d0c4b4';  // deeper shadow
  const bodyHi = outlineMode ? '#111' : '#f8f4ee';  // highlight
  const belly  = outlineMode ? '#111' : '#f5efe5';  // light belly
  const backLn = outlineMode ? '#111' : '#c8baa8';  // back line
  const mane   = outlineMode ? '#111' : '#1a1410';  // dark mane
  const mane2  = outlineMode ? '#111' : '#2a2218';
  const headC  = outlineMode ? '#111' : '#f0e8dd';
  const snout  = outlineMode ? '#111' : '#f5ece0';
  const muzzle = outlineMode ? '#111' : '#f8ddd0';  // pinkish muzzle
  const earIn  = outlineMode ? '#111' : '#f0c8b8';
  const eyeW   = outlineMode ? '#111' : '#fff';
  const eyeP   = outlineMode ? '#111' : '#111';
  const nostril= outlineMode ? '#111' : '#bfa090';
  const mouth  = outlineMode ? '#111' : '#d0b8a8';
  const legC1  = outlineMode ? '#111' : '#e0d4c4';
  const legC2  = outlineMode ? '#111' : '#d0c0b0';
  const jointC = outlineMode ? '#111' : '#c0b0a0';
  const hoofC  = outlineMode ? '#111' : '#333';
  const beerMug   = outlineMode ? '#111' : '#daa520';
  const beerMugHi = outlineMode ? '#111' : '#e8b830';
  const beerLiq   = outlineMode ? '#111' : '#e8a020';
  const beerLiqHi = outlineMode ? '#111' : '#f0b830';
  const beerFoam  = outlineMode ? '#111' : '#fffff0';
  const beerFoam2 = outlineMode ? '#111' : '#fffde0';
  const beerHandle= outlineMode ? '#111' : '#8a6020';
  const beerRim   = outlineMode ? '#111' : '#8a5a10';
  const splashC   = outlineMode ? '#111' : '#f0c040';
  const splashC2  = outlineMode ? '#111' : '#ffe070';

  // --- TAIL ---
  const tailWag = jumping ? -3 : (frame === 0 ? 2 : -2);
  px(baseX - 4*s, baseY - 22*s, s, 2*s, mane);
  px(baseX - 5*s, baseY - 24*s + tailWag, s, 3*s, mane);
  px(baseX - 6*s, baseY - 25*s + tailWag, s, 4*s, mane);
  px(baseX - 7*s, baseY - 24*s + tailWag*1.5, s, 3*s, mane2);
  px(baseX - 8*s, baseY - 23*s + tailWag*1.5, s, 2*s, mane2);

  // --- BODY ---
  for (let i = 0; i < 14; i++) {
    const shade = i < 3 ? body1 : i < 6 ? bodyHi : i < 10 ? body2 : body3;
    px(baseX + i*s, baseY - 24*s, s, 10*s, shade);
  }
  // Belly
  for (let i = 3; i < 11; i++) {
    px(baseX + i*s, baseY - 16*s, s, 2*s, belly);
  }
  // Back line
  for (let i = 1; i < 13; i++) {
    px(baseX + i*s, baseY - 24*s, s, s, backLn);
  }
  // Chest
  px(baseX + 14*s, baseY - 23*s, s, 7*s, body2);
  px(baseX + 14*s, baseY - 22*s, s, 5*s, body1);
  // Shoulder highlights
  px(baseX + 11*s, baseY - 22*s, 2*s, 3*s, bodyHi);
  px(baseX + 3*s, baseY - 22*s, 2*s, 3*s, bodyHi);

  // --- NECK ---
  px(baseX + 14*s, baseY - 28*s, 2*s, 5*s, body2);
  px(baseX + 15*s, baseY - 31*s, 2*s, 4*s, body2);
  px(baseX + 16*s, baseY - 33*s, 2*s, 3*s, body2);
  px(baseX + 14*s, baseY - 28*s, s, 5*s, body1);
  px(baseX + 15*s, baseY - 31*s, s, 3*s, body1);

  // --- MANE ---
  const maneOff = frame === 0 ? 0 : s;
  px(baseX + 13*s, baseY - 29*s + maneOff, s, 6*s, mane);
  px(baseX + 14*s, baseY - 32*s + maneOff, s, 5*s, mane);
  px(baseX + 15*s, baseY - 34*s + maneOff, s, 4*s, mane);
  px(baseX + 16*s, baseY - 35*s + maneOff, s, 3*s, mane);
  px(baseX + 12*s, baseY - 27*s + maneOff, s, 4*s, mane2);
  px(baseX + 17*s, baseY - 37*s, s, 2*s, mane);

  // --- HEAD ---
  px(baseX + 17*s, baseY - 35*s, 3*s, 4*s, headC);
  px(baseX + 18*s, baseY - 36*s, 2*s, 2*s, headC);
  px(baseX + 20*s, baseY - 34*s, 3*s, 3*s, snout);
  px(baseX + 21*s, baseY - 33*s, 2*s, 2*s, muzzle);
  px(baseX + 22*s, baseY - 33*s, 2*s, 2*s, muzzle);

  // --- EARS ---
  px(baseX + 17*s, baseY - 37*s, s, 2*s, body2);
  px(baseX + 19*s, baseY - 37*s, s, 2*s, body2);
  px(baseX + 17*s, baseY - 36*s, s, s, earIn);
  px(baseX + 19*s, baseY - 36*s, s, s, earIn);

  // --- EYE ---
  px(baseX + 19*s, baseY - 35*s, 2*s, 2*s, eyeW);
  px(baseX + 20*s, baseY - 35*s, s, s, eyeP);

  // --- NOSTRIL ---
  px(baseX + 23*s, baseY - 33*s, s, s, nostril);
  // --- MOUTH ---
  px(baseX + 21*s, baseY - 31*s, 2*s, s, mouth);

  // --- LEGS ---
  if (jumping) {
    px(baseX + 12*s, baseY - 14*s, 2*s, 3*s, legC1);
    px(baseX + 13*s, baseY - 11*s, 2*s, 3*s, legC2);
    px(baseX + 14*s, baseY - 9*s, 2*s, s, hoofC);
    px(baseX + 2*s, baseY - 14*s, 2*s, 3*s, legC1);
    px(baseX + 1*s, baseY - 11*s, 2*s, 3*s, legC2);
    px(baseX + 0*s, baseY - 9*s, 2*s, s, hoofC);
  } else if (frame === 0) {
    px(baseX + 14*s, baseY - 14*s, 2*s, 4*s, legC1);
    px(baseX + 15*s, baseY - 10*s, 2*s, 3*s, legC2);
    px(baseX + 15*s, baseY - 7*s, s, s, jointC);
    px(baseX + 16*s, baseY - 6*s, 2*s, 4*s, legC2);
    px(baseX + 16*s, baseY - 2*s, 2*s, 2*s, hoofC);

    px(baseX + 11*s, baseY - 14*s, 2*s, 4*s, legC1);
    px(baseX + 10*s, baseY - 10*s, 2*s, 5*s, legC2);
    px(baseX + 10*s, baseY - 5*s, s, s, jointC);
    px(baseX + 10*s, baseY - 4*s, 2*s, 2*s, legC2);
    px(baseX + 10*s, baseY - 2*s, 2*s, 2*s, hoofC);

    px(baseX + 1*s, baseY - 14*s, 2*s, 4*s, legC1);
    px(baseX + 0*s, baseY - 10*s, 2*s, 5*s, legC2);
    px(baseX + 0*s, baseY - 5*s, s, s, jointC);
    px(baseX - 1*s, baseY - 4*s, 2*s, 2*s, legC2);
    px(baseX - 1*s, baseY - 2*s, 2*s, 2*s, hoofC);

    px(baseX + 4*s, baseY - 14*s, 2*s, 3*s, legC1);
    px(baseX + 5*s, baseY - 11*s, 2*s, 4*s, legC2);
    px(baseX + 5*s, baseY - 7*s, s, s, jointC);
    px(baseX + 6*s, baseY - 6*s, 2*s, 4*s, legC2);
    px(baseX + 6*s, baseY - 2*s, 2*s, 2*s, hoofC);
  } else {
    px(baseX + 12*s, baseY - 14*s, 2*s, 4*s, legC1);
    px(baseX + 11*s, baseY - 10*s, 2*s, 5*s, legC2);
    px(baseX + 11*s, baseY - 5*s, s, s, jointC);
    px(baseX + 11*s, baseY - 4*s, 2*s, 2*s, legC2);
    px(baseX + 11*s, baseY - 2*s, 2*s, 2*s, hoofC);

    px(baseX + 14*s, baseY - 14*s, 2*s, 3*s, legC1);
    px(baseX + 15*s, baseY - 11*s, 2*s, 4*s, legC2);
    px(baseX + 16*s, baseY - 6*s, 2*s, 4*s, legC2);
    px(baseX + 16*s, baseY - 2*s, 2*s, 2*s, hoofC);

    px(baseX + 3*s, baseY - 14*s, 2*s, 3*s, legC1);
    px(baseX + 4*s, baseY - 11*s, 2*s, 4*s, legC2);
    px(baseX + 5*s, baseY - 6*s, 2*s, 4*s, legC2);
    px(baseX + 5*s, baseY - 2*s, 2*s, 2*s, hoofC);

    px(baseX + 1*s, baseY - 14*s, 2*s, 4*s, legC1);
    px(baseX - 1*s, baseY - 10*s, 2*s, 5*s, legC2);
    px(baseX - 1*s, baseY - 5*s, s, s, jointC);
    px(baseX - 2*s, baseY - 4*s, 2*s, 2*s, legC2);
    px(baseX - 2*s, baseY - 2*s, 2*s, 2*s, hoofC);
  }

  // --- BEER MUG ---
  const bx = baseX + 6*s;
  const by = baseY - 18*s;
  px(bx - s, by + s, s, 4*s, beerHandle);
  px(bx - 2*s, by + 2*s, s, 2*s, beerHandle);
  px(bx, by, 4*s, 6*s, beerMug);
  px(bx + s, by, 2*s, 6*s, beerMugHi);
  px(bx + s, by + s, 2*s, 4*s, beerLiq);
  px(bx + s, by + 2*s, 2*s, 2*s, beerLiqHi);
  px(bx, by - s, 4*s, s, beerFoam);
  px(bx + s, by - 2*s, 2*s, s, beerFoam2);
  px(bx, by + 6*s, 4*s, s, beerRim);

  if (jumping) {
    px(bx + s, by - 3*s, s, s, splashC);
    px(bx + 3*s, by - 4*s, s, s, splashC);
    px(bx - s, by - 2*s, s, s, splashC2);
    px(bx + 5*s, by - 3*s, s, s, splashC);
    px(bx + 2*s, by - 5*s, s, s, beerFoam);
    px(bx + 4*s, by - 2*s, s, s, beerFoam);
  }
}

function drawMafiosoFornacella(x, y, fc) {
  const s = 3;
  // Beret
  px(x + 2*s, y - 20*s, 6*s, s, '#444');
  px(x + 3*s, y - 21*s, 4*s, s, '#555');
  // Head
  px(x + 3*s, y - 19*s, 4*s, 4*s, '#d4a574');
  px(x + 4*s, y - 18*s, s, s, '#111');
  px(x + 6*s, y - 18*s, s, s, '#111');
  px(x + 4*s, y - 16*s, 3*s, s, '#aa5040');
  // Neck
  px(x + 4*s, y - 15*s, 2*s, s, '#c49564');
  // Polo
  px(x + 2*s, y - 14*s, 6*s, 6*s, '#006633');
  px(x + 3*s, y - 14*s, 4*s, 6*s, '#008844');
  px(x + 4*s, y - 14*s, 2*s, s, '#004422');
  // Arms
  px(x + s, y - 14*s, s, 3*s, '#d4a574');
  px(x + 8*s, y - 14*s, s, 3*s, '#d4a574');
  px(x, y - 11*s, 2*s, s, '#d4a574');
  px(x + 8*s, y - 11*s, 2*s, s, '#d4a574');
  // Mini fornacella
  const fx = x + s, fy = y - 27*s;
  px(fx + s, fy + 5*s, s, 2*s, '#555');
  px(fx + 4*s, fy + 5*s, s, 2*s, '#555');
  px(fx, fy + 3*s, 6*s, 2*s, '#777');
  px(fx + s, fy + 3*s, 4*s, 2*s, '#888');
  px(fx + s, fy + 2*s, 4*s, s, '#cc3300');
  const flicker = fc % 10 < 5;
  px(fx + 2*s, fy + s, 2*s, s, flicker ? '#ff6600' : '#ff4400');
  px(fx + s, fy, s, s, flicker ? '#ffcc00' : '#ff8800');
  px(fx + 3*s, fy - s, s, s, flicker ? '#ffcc00' : '#ff9900');
  // Pants
  px(x + 3*s, y - 8*s, 4*s, 5*s, '#333');
  px(x + 4*s, y - 8*s, 2*s, 5*s, '#444');
  // Shoes
  px(x + 3*s, y - 3*s, 2*s, 2*s, '#222');
  px(x + 5*s, y - 3*s, 2*s, 2*s, '#222');
}

function drawFornacellaConArrostitori(x, y, fc) {
  const s = 3;
  // Person grilling behind
  const px2 = x + 2*s, py = y - 3*s;
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(px2 + 2*s, py - 18*s, 3*s, 3*s);
  ctx.fillStyle = '#111';
  ctx.fillRect(px2 + 3*s, py - 17*s, s, s);
  ctx.fillStyle = '#eee';
  ctx.fillRect(px2 + s, py - 15*s, 5*s, 6*s);
  ctx.fillStyle = '#ddd';
  ctx.fillRect(px2 + 2*s, py - 15*s, 3*s, 6*s);
  ctx.fillStyle = '#cc0000';
  ctx.fillRect(px2 + s, py - 13*s, 5*s, s);
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(px2, py - 14*s, s, 3*s);
  ctx.fillRect(px2 + 6*s, py - 14*s, s, 3*s);
  ctx.fillStyle = '#888';
  ctx.fillRect(px2 + 6*s, py - 11*s, s, 3*s);
  ctx.fillRect(px2 + 7*s, py - 10*s, s, 2*s);
  ctx.fillStyle = '#333';
  ctx.fillRect(px2 + 2*s, py - 9*s, 2*s, 5*s);
  ctx.fillRect(px2 + 4*s, py - 9*s, 2*s, 5*s);
  ctx.fillStyle = '#222';
  ctx.fillRect(px2 + s, py - 4*s, 2*s, s);
  ctx.fillRect(px2 + 4*s, py - 4*s, 2*s, s);

  // Fornacella in front
  ctx.fillStyle = '#555';
  ctx.fillRect(x + s, y - s, s, 2*s);
  ctx.fillRect(x + 4*s, y, s, s);
  ctx.fillRect(x + 7*s, y - s, s, 2*s);
  ctx.fillStyle = '#777';
  ctx.fillRect(x, y - 6*s, 9*s, 5*s);
  ctx.fillStyle = '#888';
  ctx.fillRect(x + s, y - 6*s, 7*s, 5*s);
  ctx.fillStyle = '#999';
  ctx.fillRect(x, y - 6*s, 9*s, s);
  ctx.fillStyle = '#cc3300';
  ctx.fillRect(x + s, y - 5*s, 7*s, s);
  ctx.fillStyle = '#8a2020';
  ctx.fillRect(x + s, y - 7*s, 2*s, s);
  ctx.fillStyle = '#9a3030';
  ctx.fillRect(x + 4*s, y - 7*s, 2*s, s);
  ctx.fillStyle = '#7a2828';
  ctx.fillRect(x + 7*s, y - 7*s, s, s);
  ctx.fillStyle = '#aa4030';
  ctx.fillRect(x + 2*s, y - 7*s, s, s);
  ctx.fillRect(x + 5*s, y - 7*s, s, s);
  const fl = fc % 14;
  ctx.fillStyle = 'rgba(200,200,200,0.4)';
  ctx.fillRect(x + 2*s, y - 8*s - (fl % 4) * s, s, s);
  ctx.fillRect(x + 5*s, y - 9*s - (fl % 3) * s, s, s);
  ctx.fillRect(x + 3*s, y - 10*s - (fl % 5) * s, s, s);
  const f2 = fc % 10 < 5;
  ctx.fillStyle = f2 ? '#ff6600' : '#ff4400';
  ctx.fillRect(x + 3*s, y - 8*s, s, s);
  ctx.fillStyle = f2 ? '#ffcc00' : '#ff8800';
  ctx.fillRect(x + 6*s, y - 8*s, s, s);
}

// ==================== VIDEO / INTRO ====================
const introVideo = document.getElementById('introVideo');
const skipBtn = document.getElementById('skipBtn');
introVideo.src = 'intro.mp4';
let introWatched = localStorage.getItem('cavalloIntroWatched') === '1';
let afterVideoTarget = 'menu'; // 'menu' or 'playing'

const videoBg = document.getElementById('videoBg');

function playIntro(afterDone) {
  afterVideoTarget = afterDone;
  videoBg.style.display = 'block';
  introVideo.style.display = 'block';
  skipBtn.style.display = 'block';
  introVideo.currentTime = 0;
  introVideo.play().catch(() => { endIntro(); });
}

const creditsOverlay = document.getElementById('creditsOverlay');
const creditsCloseBtn = document.getElementById('creditsCloseBtn');

function endIntro() {
  introVideo.pause();
  introVideo.style.display = 'none';
  skipBtn.style.display = 'none';
  videoBg.style.display = 'none';
  if (afterVideoTarget === 'playing') {
    introWatched = true;
    localStorage.setItem('cavalloIntroWatched', '1');
    gameState = 'playing';
    resetGame();
  } else {
    creditsOverlay.classList.add('show');
  }
}

creditsCloseBtn.addEventListener('click', () => {
  creditsOverlay.classList.remove('show');
  gameState = 'menu';
});

// ==================== NICKNAME OVERLAY ====================
const nicknameOverlay = document.getElementById('nicknameOverlay');
const nicknameInput = document.getElementById('nicknameInput');
const nicknameBtn = document.getElementById('nicknameBtn');

let nicknameAction = 'play'; // 'play' or 'change'

function confirmNickname() {
  const val = nicknameInput.value.trim();
  if (!val) return;
  playerNickname = val;
  localStorage.setItem('cavalloNickname', playerNickname);
  nicknameOverlay.classList.remove('show');
  if (nicknameAction === 'change') {
    gameState = 'menu';
    return;
  }
  if (!introWatched) {
    playIntro('playing');
  } else {
    ScreenFade.start('out-in', 30, () => { gameState = 'playing'; resetGame(); });
  }
}

nicknameBtn.addEventListener('click', confirmNickname);
nicknameInput.addEventListener('keydown', (e) => {
  if (e.code === 'Enter') confirmNickname();
});

// ==================== LEADERBOARD FETCH / SUBMIT ====================
function fetchLeaderboard() {
  if (LEADERBOARD_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  leaderboardLoading = true;
  fetch(LEADERBOARD_URL + '?action=get')
    .then(r => r.json())
    .then(data => { leaderboardData = data; leaderboardLoading = false; })
    .catch(() => { leaderboardLoading = false; });
}

function submitScore(nickname, s) {
  if (LEADERBOARD_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;

  px(x + 14*s, y - 22*s, 6*s, 6*s, stone2);

// ==================== OBSTACLE SPAWN ====================
const OBS_TYPES = {
  fornacella1:     { type: 'fornacella1', w: 27, h: 36 },
  fornacella2:     { type: 'fornacella2', w: 30, h: 40 },
  fornacellaGrill: { type: 'fornacellaGrill', w: 36, h: 60 },
  mafColtello:     { type: 'mafColtello', w: 33, h: 63 },
  mafLupara:       { type: 'mafLupara', w: 36, h: 72 },
  mafFornacella:   { type: 'mafFornacella', w: 33, h: 84 },
};

const OBS_POOLS = {
  early: [
    { type: 'fornacella1', weight: 3 },
    { type: 'fornacella2', weight: 2 }
  ],
  mid: [
    { type: 'fornacella1', weight: 2 },
    { type: 'fornacella2', weight: 2 },
    { type: 'fornacellaGrill', weight: 2 },
    { type: 'mafColtello', weight: 1 }
  ],
  late: [
    { type: 'fornacella1', weight: 1 },
    { type: 'fornacella2', weight: 1 },
    { type: 'fornacellaGrill', weight: 2 },
    { type: 'mafColtello', weight: 2 },
    { type: 'mafLupara', weight: 1 },
    { type: 'mafFornacella', weight: 1 }
  ]
};

function getObstaclePool(s) {
  if (s < 1000) return OBS_POOLS.early;
  if (s < 5000) return OBS_POOLS.mid;
  return OBS_POOLS.late;
}

function pickRandomObs() {
  const pool = getObstaclePool(score);
  const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
  let r = Math.random() * totalWeight;
  for (const item of pool) {
    r -= item.weight;
    if (r <= 0) return OBS_TYPES[item.type];
  }
  return OBS_TYPES[pool[0].type];
}

let nextSpawnInterval = 80; // frames until next spawn

function pickNextInterval() {
  // Adaptive spawn: interval scales inversely with speed
  const speedFactor = speed / 5.0;
  const base = Math.max(Math.floor(45 / speedFactor), 30);
  const variance = Math.max(90 - Math.floor(score / 500), 40);

  let min = base;
  let max = base + variance;

  // Grace period post-boss: increase intervals
  if (postBossGracePeriod > 0) {
    min += 20;
    max += 40;
  }

  // 15% chance of breather gap
  if (Math.random() < 0.15) {
    return min + max + Math.floor(Math.random() * 50);
  }
  return min + Math.floor(Math.random() * (max - min));
}

function shouldSpawnCluster() {
  // Continuous growth, no cap
  const baseClusterChance = 0.08 + (score / 25000);
  // Forced breather every 12 obstacles
  const BREATHER_INTERVAL = 12;
  if (obstaclesSinceLastBreather >= BREATHER_INTERVAL) return false;
  // Reduce chance if many recent clusters
  const penalty = Math.min(obstaclesSinceLastBreather / BREATHER_INTERVAL, 1.0);
  return Math.random() < baseClusterChance * penalty;
}

function spawnObstacle() {
  const doCluster = shouldSpawnCluster();

  const o = pickRandomObs();
  if (doCluster) {
    const count = Math.random() < 0.3 + score / 30000 ? 3 : 2;
    let xOff = canvas.width + 20;
    for (let i = 0; i < count; i++) {
      const gap = Math.floor(Math.random() * 10) + 4;
      obstacles.push({ type: o.type, x: xOff, y: GROUND_Y, width: o.w, height: o.h });
      xOff += o.w + gap;
    }
    obstaclesSinceLastBreather = 0;
  } else {
    obstacles.push({ type: o.type, x: canvas.width + 20, y: GROUND_Y, width: o.w, height: o.h });
    obstaclesSinceLastBreather++;
  }
}

let jumpPressed = false;

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
  const cy = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

function hitTest(pos, btn) {
  return pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h;
}

// "Cambia" nickname click area
let btnChangeNick = { x: 0, y: 0, w: 0, h: 0 };

function handleMenuClick(pos) {
  if (hitTest(pos, btnPlay)) {
    if (!playerNickname) {
      nicknameAction = 'play';
      nicknameOverlay.classList.add('show');
      nicknameInput.value = '';
      nicknameInput.focus();
      return;
    }
    if (!introWatched) {
      playIntro('playing');
    } else {
      ScreenFade.start('out-in', 30, () => { gameState = 'playing'; resetGame(); });
    }
  } else if (hitTest(pos, btnLeaderboard)) {
    gameState = 'leaderboard';
    fetchLeaderboard();
  } else if (hitTest(pos, btnRecipes)) {
    gameState = 'recipes';
  } else if (hitTest(pos, btnIntro)) {
    playIntro('menu');
  } else if (playerNickname && hitTest(pos, btnChangeNick)) {
    nicknameAction = 'change';
    nicknameOverlay.classList.add('show');
    nicknameInput.value = playerNickname;
    nicknameInput.focus();
  }
}

// Home button rect (drawn on canvas during gameplay)
let btnHome = { x: 0, y: 0, w: 0, h: 0 };

function onJump() {
  if (ScreenFade.active) return;
  if (gameState === 'gameover') {
    ScreenFade.start('out-in', 25, () => { gameState = 'playing'; resetGame(); });
    return;
  }
  if (gameState === 'playing' && horse.grounded) {
    horse.vy = JUMP_FORCE;
    horse.jumping = true;
    horse.grounded = false;
    AudioManager.play('jump');
  }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameState === 'menu') {
      if (!playerNickname) {
        nicknameAction = 'play';
        nicknameOverlay.classList.add('show');
        nicknameInput.value = '';
        nicknameInput.focus();
        return;
      }
      if (!introWatched) { playIntro('playing'); }
      else { ScreenFade.start('out-in', 30, () => { gameState = 'playing'; resetGame(); }); }
      return;
    }
    if (!jumpPressed) { jumpPressed = true; onJump(); }
  }
  if (e.code === 'Escape' && (gameState === 'playing' || gameState === 'gameover' || gameState === 'recipes' || gameState === 'leaderboard')) {
    gameState = 'menu';
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
});

canvas.addEventListener('mousemove', (e) => {
  if (gameState !== 'menu') { menuHover = ''; return; }
  const pos = getCanvasPos(e);
  if (hitTest(pos, btnPlay)) menuHover = 'play';
  else if (hitTest(pos, btnLeaderboard)) menuHover = 'leaderboard';
  else if (hitTest(pos, btnRecipes)) menuHover = 'recipes';
  else if (hitTest(pos, btnIntro)) menuHover = 'intro';
  else menuHover = '';
});

function handleGameClick(pos) {
  // Check home button
  if ((gameState === 'playing' || gameState === 'gameover') && hitTest(pos, btnHome)) {
    gameState = 'menu';
    return true;
  }
  return false;
}

function handleRecipesClick(pos) {
  const totalPages = Math.ceil(RECIPES.length / RECIPES_PER_PAGE);
  const currentPage = Math.floor(recipesScroll / RECIPES_PER_PAGE);
  if (hitTest(pos, btnRecipesBack)) { gameState = 'menu'; recipesScroll = 0; return; }
  if (currentPage > 0 && hitTest(pos, btnRecipesPrev)) { recipesScroll -= RECIPES_PER_PAGE; return; }
  if (currentPage < totalPages - 1 && hitTest(pos, btnRecipesNext)) { recipesScroll += RECIPES_PER_PAGE; return; }
}

function handleLeaderboardClick(pos) {
  if (hitTest(pos, btnLeaderboardBack)) { gameState = 'menu'; return; }
}

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (gameState === 'menu') { handleMenuClick(getCanvasPos(e)); return; }
  if (gameState === 'leaderboard') { handleLeaderboardClick(getCanvasPos(e)); return; }
  if (gameState === 'recipes') { handleRecipesClick(getCanvasPos(e)); return; }
  if (handleGameClick(getCanvasPos(e))) return;
  onJump();
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'menu') { handleMenuClick(getCanvasPos(e)); return; }
  if (gameState === 'leaderboard') { handleLeaderboardClick(getCanvasPos(e)); return; }
  if (gameState === 'recipes') { handleRecipesClick(getCanvasPos(e)); return; }
  if (handleGameClick(getCanvasPos(e))) return;
  onJump();
}, { passive: false });

// Prevent scroll/zoom on mobile
document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', (e) => { e.preventDefault(); });

function resetGame() {
  score = 0;
  speed = baseSpeed;
  horse.y = GROUND_Y;
  horse.vy = 0;
  horse.jumping = false;
  horse.grounded = true;
  obstacles = [];
  frameCount = 0;
  lastObstacleSpawn = 0;
  // Gamification reset
  arancini = [];
  aranciniCollected = 0;
  streak = 0;
  bestStreak = 0;
  multiplier = 1;
  recordBroken = false;
  recordFlashTimer = 0;
  floatingTexts = [];
  currentRank = RANKS[0].title;
  rankUpTimer = 0;
  scorePulseTimer = 0;
  lastDisplayedScore = 0;
  rankCelebrationTimer = 0;
  rankCelebrationTitle = '';
  scoreSubmitted = false;
  // Boss reset
  boss = null;
  bossHits = 0;
  bossLavas = [];
  bossLavaTimer = 0;
  bossDefeated = 0;
  bossFlashTimer = 0;
  bossIntroTimer = 0;
  postBossGracePeriod = 0;
  obstaclesSinceLastBreather = 0;
  framesSinceLastArancino = 0;
  // Generate random unlock score for each locked recipe (50% guaranteed, 50% range)
  recipeUnlockTargets = [];
  for (const r of RECIPES) {
    if (!unlockedRecipes.includes(r.id)) {
      const useGuaranteed = Math.random() < 0.5;
      const guaranteedScores = { arancino: 500, norma: 1500, granita: 2500, cannolo: 4000, caponata: 6000, cartocciata: 8000, cipollina: 10500, crispelle: 13000, pesce_spada: 16000, sarde: 20000 };
      const target = useGuaranteed && guaranteedScores[r.id]
        ? guaranteedScores[r.id]
        : r.minScore + Math.floor(Math.random() * (r.maxScore - r.minScore));
      recipeUnlockTargets.push({ id: r.id, target });
    }
  }
}

let animTimer = 0;
let spawnTimer = 0;

function update(dt) {
  ScreenFade.update(dt);
  // Animate horse on menu screen too
  if (gameState === 'menu') {
    frameCount++;
    animTimer += dt;
    if (animTimer >= 8) { animTimer -= 8; animFrame = animFrame === 0 ? 1 : 0; }
    ParallaxBg.update(dt, 1.5); // slow crawl for menu background atmosphere
    return;
  }
  if (gameState !== 'playing') return;
  frameCount++;

  // Hybrid speed formula: log (early boost) + power (late-game control)
  speed = baseSpeed + 1.8 * Math.log(1 + score / 600) + 0.4 * Math.pow(score / 2000, 0.65);

  // Decrement post-boss grace period
  if (postBossGracePeriod > 0) postBossGracePeriod -= dt * 60;

  horse.vy += GRAVITY * dt;
  horse.y += horse.vy * dt;
  if (horse.y >= GROUND_Y) {
    horse.y = GROUND_Y;
    horse.vy = 0;
    horse.jumping = false;
    horse.grounded = true;
    if (jumpPressed) {
      horse.vy = JUMP_FORCE;
      horse.jumping = true;
      horse.grounded = false;
    }
  }

  animTimer += dt;
  if (animTimer >= 8) { animTimer -= 8; animFrame = animFrame === 0 ? 1 : 0; }

  // Don't spawn obstacles during boss fight
  if (!boss) {
    spawnTimer += dt;
    if (spawnTimer >= nextSpawnInterval) {
      spawnObstacle();
      spawnTimer = 0;
      nextSpawnInterval = pickNextInterval();
    }
  }

  groundOffset = (groundOffset + speed * dt) % 24;
  ParallaxBg.update(dt, speed);
  score += Math.round(0.7 * dt);

  // --- Score pulse: trigger every 100 points milestone ---
  const scoreMilestone = Math.floor(score / 100);
  if (scoreMilestone > Math.floor(lastDisplayedScore / 100)) {
    scorePulseTimer = 8;
  }
  lastDisplayedScore = score;
  if (scorePulseTimer > 0) scorePulseTimer -= dt;

  // --- Horse hitbox (computed once, used for arancini + collision) ---
  const hx = horse.x + 8;
  const hy = horse.y - HORSE_H + 14;
  const hw = HORSE_W - 14;
  const hh = HORSE_H - 18;
  const hx2 = hx + hw;
  const hy2 = hy + hh;

  // --- Single pass: move obstacles + streak + collision ---
  let obsLen = obstacles.length;
  let writeIdx = 0;
  for (let i = 0; i < obsLen; i++) {
    const obs = obstacles[i];
    obs.x -= speed * dt;
    if (obs.x + obs.width < -50) continue; // skip dead, don't copy

    // Streak / near miss
    if (!obs.passed) {
      const obsRight = obs.x + obs.width;
      if (obs.x < horse.x + HORSE_W && obsRight > horse.x) {
        const clearance = (obs.y - obs.height + 4) - (horse.y - 4);
        if (clearance >= 0 && (obs.minClearance === undefined || clearance < obs.minClearance)) {
          obs.minClearance = clearance;
        }
      }
      if (obsRight < horse.x) {
        obs.passed = true;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        // Extended multiplier: logarithmic growth beyond streak 9
        if (streak < 3) multiplier = 1;
        else if (streak < 10) multiplier = 1 + Math.floor(streak / 3);
        else multiplier = 4 + Math.floor(Math.log2((streak - 9) / 3 + 1));
        if (obs.minClearance !== undefined && obs.minClearance < 22) {
          // Near miss bonus scales with speed
          const nearMissBase = 50 + Math.floor((speed - 5.0) * 8);
          const bonus = nearMissBase * multiplier;
          score += bonus;
          addFloatingText('MINCHIA CHE CULO! +' + bonus, horse.x, horse.y - HORSE_H - 30, '#ff44ff', 15);
        }
        if (streak % 5 === 0) {
          addFloatingText('STREAK x' + streak + '!', horse.x + 40, horse.y - HORSE_H - 15, '#00ff88', 14);
        }
      }
    }

    // Collision
    if (gameState === 'playing') {
      const ox = obs.x + 4;
      const oy = obs.y - obs.height + 4;
      if (hx < ox + obs.width - 8 && hx2 > ox && hy < oy + obs.height - 6 && hy2 > oy) {
        gameState = 'gameover';
        AudioManager.play('gameOver');
        ScreenFade.start('in', 20);
        streak = 0;
        multiplier = 1;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('cavalloHighScore', highScore);
        }
        if (playerNickname && !scoreSubmitted) {
          submitScore(playerNickname, score);
        }
      }
    }

    obstacles[writeIdx++] = obs;
  }
  obstacles.length = writeIdx;

  // --- Arancino spawn (contextual, not during boss) ---
  framesSinceLastArancino++;
  if (!boss) {
    const arancinoInterval = 120 + Math.floor((speed - 5.0) * 15);
    if (framesSinceLastArancino >= arancinoInterval && arancini.length < 3) {
      const minH = 50 + Math.floor((speed - 5.0) * 5);
      const maxH = 110 + Math.floor((speed - 5.0) * 8);
      const h = minH + Math.random() * (maxH - minH);
      arancini.push({ x: canvas.width + 10, y: GROUND_Y - h, w: 16, h: 16 });
      framesSinceLastArancino = 0;
    }
  }

  // --- Single pass: move arancini + collection ---
  let aLen = arancini.length;
  let aWrite = 0;
  for (let i = 0; i < aLen; i++) {
    const a = arancini[i];
    a.x -= speed * dt;
    if (a.x < -20) continue;
    if (hx < a.x + a.w && hx2 > a.x && hy < a.y + a.h && hy2 > a.y) {
      aranciniCollected++;
      AudioManager.play('collect');
      const bonus = 30 * multiplier;
      score += bonus;
      scorePulseTimer = 8; // pulse on arancino pickup (discrete event)
      addFloatingText('ARANCINU! +' + bonus, a.x, a.y - 10, '#ffaa00', 14);
      continue;
    }
    arancini[aWrite++] = a;
  }
  arancini.length = aWrite;

  // --- Recipe unlock by score ---
  let rLen = recipeUnlockTargets.length;
  let rWrite = 0;
  for (let i = 0; i < rLen; i++) {
    const rt = recipeUnlockTargets[i];
    if (score >= rt.target) {
      const recipe = RECIPES.find(r => r.id === rt.id);
      if (recipe && !unlockedRecipes.includes(rt.id)) {
        unlockedRecipes.push(rt.id);
        localStorage.setItem('cavalloRecipes', JSON.stringify(unlockedRecipes));
        addFloatingText('RICETTA SBLOCCATA!', canvas.width / 2, 100, '#ffdd00', 18);
        addFloatingText(recipe.name, canvas.width / 2, 122, '#ffcc88', 15);
      }
      continue;
    }
    recipeUnlockTargets[rWrite++] = rt;
  }
  recipeUnlockTargets.length = rWrite;

  // --- Record break detection ---
  if (!recordBroken && highScore > 0 && score > highScore) {
    recordBroken = true;
    recordFlashTimer = 90;
    addFloatingText('NUOVO RECORD!!!', canvas.width / 2 - 60, 60, '#ffd700', 22);
    addFloatingText('SEI NU GRANDE!', canvas.width / 2 - 50, 85, '#ff6633', 16);
  }
  if (recordFlashTimer > 0) recordFlashTimer -= dt;

  // --- Rank tracking ---
  const newRank = getCurrentRank();
  if (newRank !== currentRank) {
    if (currentRank !== '') {
      rankUpTimer = 80;
      // Enhanced rank-up celebration
      rankCelebrationTimer = 60;
      rankCelebrationTitle = newRank;
      // Initialize burst particles around the banner area
      const bannerCX = Math.floor(canvas.width / 2);
      const bannerCY = 80;
      for (let pi = 0; pi < RANK_PARTICLES.length; pi++) {
        const angle = (pi / RANK_PARTICLES.length) * Math.PI * 2;
        RANK_PARTICLES[pi].x = bannerCX + Math.cos(angle) * 40;
        RANK_PARTICLES[pi].y = bannerCY;
        RANK_PARTICLES[pi].vx = Math.cos(angle) * (2 + Math.random() * 2);
        RANK_PARTICLES[pi].vy = Math.sin(angle) * (2 + Math.random() * 2) - 2;
        RANK_PARTICLES[pi].color = RANK_BURST_COLORS[pi % RANK_BURST_COLORS.length];
        RANK_PARTICLES[pi].alpha = 1;
      }
      addFloatingText('RANK UP: ' + newRank, canvas.width / 2, 150, '#00ffcc', 16);
    }
    currentRank = newRank;
  }
  if (rankUpTimer > 0) rankUpTimer -= dt;
  if (rankCelebrationTimer > 0) rankCelebrationTimer -= dt;

  // --- Floating texts update (swap-remove) ---
  let fLen = floatingTexts.length;
  let fWrite = 0;
  for (let i = 0; i < fLen; i++) {
    const ft = floatingTexts[i];
    ft.y -= 0.8 * dt;
    ft.life -= dt;
    if (ft.life > 0) {
      floatingTexts[fWrite++] = ft;
    }
  }
  floatingTexts.length = fWrite;

  // --- BOSS TRIGGER ---
  if (score > 0 && Math.floor(score / 10000) > bossDefeated && !boss) {
    // Logarithmic boss scaling
    const bossNum = bossDefeated + 1;
    boss = {
      x: canvas.width + 50,
      y: GROUND_Y,
      w: 132,
      h: 108,
      entering: true,
      targetX: canvas.width * 0.65,
      phase: 'idle',
      chargeTimer: 0,
      chargeSpeed: 5.0 + 2.0 * Math.log(1 + bossNum * 0.8)
    };
    bossHits = 0;
    bossLavas = [];
    bossLavaTimer = 0;
    bossFlashTimer = 0;
    bossIntroTimer = 80;
    addFloatingText('U LIOTRU!!!', canvas.width / 2, canvas.height / 2 - 40, '#ff4400', 32);
  }

  // --- BOSS UPDATE ---
  if (boss && gameState === 'playing') {
    if (bossIntroTimer > 0) bossIntroTimer -= dt;
    if (bossFlashTimer > 0) bossFlashTimer -= dt;

    // Entering phase: walk in from right
    if (boss.entering) {
      boss.x -= 2.5 * dt;
      if (boss.x <= boss.targetX) {
        boss.x = boss.targetX;
        boss.entering = false;
        boss.phase = 'idle';
        boss.chargeTimer = 0;
      }
    } else {
      // Logarithmic lava interval: 130 - 15*bossNum, min 80
      const bossNum = bossDefeated + 1;
      const lavaInterval = Math.max(130 - bossNum * 15, 80);

      if (boss.phase === 'idle') {
        // Throw lava while waiting
        bossLavaTimer += dt;
        if (bossLavaTimer >= lavaInterval) {
          bossLavaTimer = 0;
          bossLavas.push({ x: boss.x - 10, y: GROUND_Y, w: 20, h: 20 });
        }
        // After a pause, charge! Logarithmic delay: 280 - 25*bossNum, min 180
        boss.chargeTimer += dt;
        const chargeDelay = Math.max(280 - bossNum * 25, 180);
        if (boss.chargeTimer >= chargeDelay && bossLavas.length === 0) {
          boss.phase = 'charging';
          boss.chargeTimer = 0;
        }
      } else if (boss.phase === 'charging') {
        // Rush toward the horse (move left)
        boss.x -= boss.chargeSpeed * dt;
        // Passed the horse? Stop and return
        if (boss.x + boss.w < -20) {
          boss.phase = 'returning';
        }
      } else if (boss.phase === 'returning') {
        // Walk back to position from the right
        boss.x += 3.5 * dt;
        if (boss.x >= boss.targetX) {
          boss.x = boss.targetX;
          boss.phase = 'idle';
          boss.chargeTimer = 0;
          bossLavaTimer = 0;
        }
      }
    }

    // Move lavas
    const lavaSpeed = 4;
    let lLen = bossLavas.length;
    let lWrite = 0;
    for (let i = 0; i < lLen; i++) {
      const lv = bossLavas[i];
      lv.x -= lavaSpeed * dt;
      if (lv.x + lv.w < -20) continue;
      // Lava-horse collision
      if (gameState === 'playing') {
        if (hx < lv.x + lv.w && hx2 > lv.x && hy < lv.y && hy2 > lv.y - lv.h) {
          gameState = 'gameover';
          AudioManager.play('gameOver');
          ScreenFade.start('in', 20);
          streak = 0; multiplier = 1;
          if (score > highScore) { highScore = score; localStorage.setItem('cavalloHighScore', highScore); }
          if (playerNickname && !scoreSubmitted) submitScore(playerNickname, score);
        }
      }
      bossLavas[lWrite++] = lv;
    }
    bossLavas.length = lWrite;

    // Horse-boss collision (only when boss is on screen and not entering)
    if (gameState === 'playing' && !boss.entering) {
      const bx1 = boss.x;
      const bx2 = boss.x + boss.w;
      const headTop = boss.y - boss.h;
      const headZone = 45;

      const overlapH = hx2 > bx1 + 10 && hx < bx2 - 10;
      const overlapFull = hx2 > bx1 && hx < bx2;

      // Horse landing on top (damage to boss)
      if (horse.vy > 0 && overlapH &&
          hy2 >= headTop && hy2 <= headTop + headZone) {
        bossHits++;
        AudioManager.play('bossHit');
        horse.vy = JUMP_FORCE * 0.7;
        horse.jumping = true;
        horse.grounded = false;
        bossFlashTimer = 15;
        addFloatingText('BUMM! ' + bossHits + '/' + bossHP, boss.x + boss.w / 2, headTop - 10, '#ff8800', 18);

        if (bossHits >= bossHP) {
          boss = null;
          bossDefeated++;
          AudioManager.play('bossDefeated');
          bossLavas = [];
          score += 1000;
          postBossGracePeriod = 500; // ~8 seconds of easier spawns
          addFloatingText('LIOTRU SCONFITTO! +1000', canvas.width / 2, canvas.height / 2 - 30, '#00ff88', 24);
        } else {
          // Knockback: boss retreats after hit, clear lavas for safety
          boss.phase = 'returning';
          boss.x = canvas.width + 50;
          bossLavas = [];
        }
      // Horse touching boss laterally (game over)
      } else if (overlapFull && hy2 > headTop + headZone) {
        gameState = 'gameover';
        AudioManager.play('gameOver');
        ScreenFade.start('in', 20);
        streak = 0; multiplier = 1;
        if (score > highScore) { highScore = score; localStorage.setItem('cavalloHighScore', highScore); }
        if (playerNickname && !scoreSubmitted) submitScore(playerNickname, score);
      }
    }
  }
}

// ==================== RENDERING ====================
function drawBackground() {
  if (bgLoaded) {
    // Draw the full image in the top portion, road area is separate below
    ctx.drawImage(bgImage, 0, 0, canvas.width, bgH);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#ff6040');
    grad.addColorStop(0.3, '#ff8855');
    grad.addColorStop(0.6, '#cc7070');
    grad.addColorStop(1, '#553344');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, GROUND_Y);
  }
}

function drawGround() {
  const gy = GROUND_Y;
  ctx.fillStyle = '#1a1510';
  ctx.fillRect(0, gy, canvas.width, ROAD_HEIGHT);
  ctx.fillStyle = '#4a3e30';
  ctx.fillRect(0, gy, canvas.width, 2);

  // Single loop for all 3 cobblestone rows + mortar
  for (let x = -groundOffset; x < canvas.width; x += 24) {
    const fx = Math.floor(x);
    ctx.fillStyle = '#2a2218'; ctx.fillRect(fx, gy + 3, 10, 8);
    ctx.fillStyle = '#332a20'; ctx.fillRect(fx + 12, gy + 3, 10, 8);
    ctx.fillStyle = '#2e261c'; ctx.fillRect(fx + 6, gy + 13, 10, 8);
    ctx.fillStyle = '#262018'; ctx.fillRect(fx + 18, gy + 13, 10, 8);
    ctx.fillStyle = '#241e16'; ctx.fillRect(fx, gy + 23, 10, 8);
    ctx.fillStyle = '#2c2418'; ctx.fillRect(fx + 12, gy + 23, 10, 8);
    ctx.fillStyle = '#14100a';
    ctx.fillRect(fx + 10, gy + 3, 2, 8);
    ctx.fillRect(fx + 16, gy + 13, 2, 8);
    ctx.fillRect(fx + 10, gy + 23, 2, 8);
  }
  ctx.fillStyle = '#14100a';
  ctx.fillRect(0, gy + 11, canvas.width, 2);
  ctx.fillRect(0, gy + 21, canvas.width, 2);
  ctx.fillRect(0, gy + 31, canvas.width, 2);
  ctx.fillStyle = '#100c08';
  ctx.fillRect(0, gy + 33, canvas.width, ROAD_HEIGHT - 33);
}

function drawHorseSprite() {
  const isJumping = horse.jumping || !horse.grounded;
  drawHorseOutline(horse.x, horse.y, animFrame, isJumping);
}

// Obstacle draw lookup (avoid switch per frame)
const OBS_DRAW = {
  'fornacella1': (x, y) => drawFornacella1(x, y, frameCount),
  'fornacella2': (x, y) => drawFornacella2(x, y, frameCount),
  'fornacellaGrill': (x, y) => drawFornacellaConArrostitori(x, y, frameCount),
  'mafColtello': drawMafiosoColtello,
  'mafLupara': drawMafiosoLupara,
  'mafFornacella': (x, y) => drawMafiosoFornacella(x, y, frameCount),
};

function drawObstacles() {
  const cw = canvas.width;
  for (let i = 0, len = obstacles.length; i < len; i++) {
    const obs = obstacles[i];
    if (obs.x > cw + 10 || obs.x + obs.width < -10) continue;
    OBS_DRAW[obs.type](obs.x, obs.y);
  }
}

function drawScore() {
  // Score panel
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(canvas.width - 172, 3, 169, 66);
  ctx.strokeStyle = 'rgba(255,102,51,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(canvas.width - 172, 3, 169, 66);
  outText('HI ' + String(highScore).padStart(5, '0'), canvas.width - 15, 22, '#ffdd33', 'bold 16px "Courier New", monospace', 'right');

  // Score pulse effect: score text briefly grows and turns gold on point gains
  const pulse = Math.max(0, scorePulseTimer / 8); // 1.0 -> 0.0
  const scoreSize = Math.floor(16 + 4 * pulse);
  const scoreColor = pulse > 0
    ? '#ffee44'  // gold during pulse
    : '#ffffff'; // white at rest
  outText(String(score).padStart(5, '0'), canvas.width - 15, 42, scoreColor, 'bold ' + scoreSize + 'px "Courier New", monospace', 'right');
  // Rank title
  outText(currentRank, canvas.width - 15, 58, '#55ffee', 'bold 13px "Courier New", monospace', 'right');

  // Record flash
  if (recordFlashTimer > 0 && recordFlashTimer % 6 < 3) {
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Left side HUD: streak & arancini
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(48, 3, 134, 49);
  ctx.strokeStyle = 'rgba(255,102,51,0.4)';
  ctx.strokeRect(48, 3, 134, 49);
  if (streak >= 3) {
    outText('STREAK: ' + streak, 56, 22, '#33ff99', 'bold 13px "Courier New", monospace', 'left');
    outText('x' + multiplier, 56, 38, '#ffdd44', 'bold 12px "Courier New", monospace', 'left');
  }
  // Arancini count
  const acText = aranciniCollected + ' arancin' + (aranciniCollected === 1 ? 'u' : 'i');
  outText(acText, streak >= 3 ? 95 : 56, streak >= 3 ? 38 : 22, '#ffcc33', 'bold 12px "Courier New", monospace', 'left');

  // Home button (top-right, next to score)
  const hx = canvas.width - 210, hy = 8, hw = 32, hh = 32;
  btnHome = { x: hx, y: hy, w: hw, h: hh };
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(hx, hy, hw, hh);
  ctx.strokeStyle = '#ff6633';
  ctx.lineWidth = 1;
  ctx.strokeRect(hx, hy, hw, hh);
  // House icon
  const cx = hx + hw / 2, cy = hy + hh / 2;
  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 9);
  ctx.lineTo(cx + 10, cy);
  ctx.lineTo(cx + 7, cy);
  ctx.lineTo(cx + 7, cy + 8);
  ctx.lineTo(cx - 7, cy + 8);
  ctx.lineTo(cx - 7, cy);
  ctx.lineTo(cx - 10, cy);
  ctx.closePath();
  ctx.fill();
  // Door
  ctx.fillStyle = '#ff6633';
  ctx.fillRect(cx - 2, cy + 1, 5, 7);
}

function drawRankCelebration() {
  if (rankCelebrationTimer <= 0) return;

  const progress = rankCelebrationTimer / 60; // 1.0 -> 0.0
  const bannerAlpha = Math.min(progress * 2, 1); // fade out in second half

  // Banner slide-in: y goes from -60 to 60 over first 15 frames (~quarter of timer)
  const slideProgress = Math.min((60 - rankCelebrationTimer) / 15, 1);
  const bannerY = Math.floor(-60 + slideProgress * 120);

  const bannerW = Math.floor(canvas.width * 0.65);
  const bannerX = Math.floor((canvas.width - bannerW) / 2);
  const bannerH = 60;

  ctx.save();
  ctx.globalAlpha = bannerAlpha;

  // Banner background: dark with gold border
  ctx.fillStyle = 'rgba(10, 5, 0, 0.88)';
  ctx.fillRect(bannerX, bannerY, bannerW, bannerH);
  ctx.strokeStyle = '#ffdd33';
  ctx.lineWidth = 2;
  ctx.strokeRect(bannerX, bannerY, bannerW, bannerH);

  // Subtitle: "RANK UP!" in cyan
  ctx.globalAlpha = bannerAlpha;
  ctx.font = 'bold 13px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#000';
  ctx.lineJoin = 'round';
  ctx.strokeText('RANK UP!', Math.floor(canvas.width / 2), bannerY + 18);
  ctx.fillStyle = '#00ffcc';
  ctx.fillText('RANK UP!', Math.floor(canvas.width / 2), bannerY + 18);

  // Main title: rank name in gold, bold 26px
  ctx.font = 'bold 26px "Courier New", monospace';
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#000';
  ctx.strokeText(rankCelebrationTitle, Math.floor(canvas.width / 2), bannerY + 48);
  ctx.fillStyle = '#ffdd33';
  ctx.fillText(rankCelebrationTitle, Math.floor(canvas.width / 2), bannerY + 48);

  // Color burst particles (active for first 20 frames of celebration)
  if (rankCelebrationTimer > 40) {
    const particleProgress = (rankCelebrationTimer - 40) / 20; // 1.0 -> 0.0 over first 20 frames
    for (let pi = 0; pi < RANK_PARTICLES.length; pi++) {
      const p = RANK_PARTICLES[pi];
      // Move outward
      p.x += p.vx;
      p.y += p.vy;
      p.alpha = particleProgress;
      ctx.globalAlpha = p.alpha * bannerAlpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 3, 3);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = Math.min(1, ft.life / 20);
    ctx.globalAlpha = alpha;
    const font = 'bold ' + ft.size + 'px "Courier New", monospace';
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.lineJoin = 'round';
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }
}

function drawAranciniSprites() {
  for (const a of arancini) {
    drawArancino(a.x, a.y);
  }
}

function drawMenuButton(x, y, w, h, text, hovered) {
  // Button background
  ctx.fillStyle = hovered ? 'rgba(255,68,0,0.5)' : 'rgba(0,0,0,0.75)';
  ctx.fillRect(x, y, w, h);
  // Border
  ctx.strokeStyle = hovered ? '#ffdd00' : '#ff6633';
  ctx.lineWidth = hovered ? 3 : 2;
  ctx.strokeRect(x, y, w, h);
  // Text
  outText(text, x + w / 2, y + h / 2 + 8, hovered ? '#ffdd00' : '#ffffff', 'bold 22px "Courier New", monospace', 'center');
}

function drawMenu() {
  ParallaxBg.draw(ctx, canvas.width, bgH);
  drawGround();

  // Horse in center
  drawHorseOutline(canvas.width / 2 - 25, GROUND_Y, animFrame, false);

  // Title with glow
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 15;
  outText('U CAVADDU RUNNER', canvas.width / 2, 55, '#ffcc00', 'bold 36px "Courier New", monospace', 'center');
  ctx.shadowBlur = 0;

  outText('~ Catania Edition ~', canvas.width / 2, 78, '#ffa866', 'bold 16px "Courier New", monospace', 'center');

  // Buttons
  const bw = 260, bh = 44, gap = 10;
  const bx = canvas.width / 2 - bw / 2;
  const by1 = 100;
  const by2 = by1 + bh + gap;
  const by3 = by2 + bh + gap;
  const by4 = by3 + bh + gap;

  btnPlay = { x: bx, y: by1, w: bw, h: bh };
  btnLeaderboard = { x: bx, y: by2, w: bw, h: bh };
  btnRecipes = { x: bx, y: by3, w: bw, h: bh };
  btnIntro = { x: bx, y: by4, w: bw, h: bh };

  drawMenuButton(bx, by1, bw, bh, 'JUCA!', menuHover === 'play');
  drawMenuButton(bx, by2, bw, bh, 'CLASSIFICA', menuHover === 'leaderboard');
  const recipesLabel = 'RICETTE (' + unlockedRecipes.length + '/10)';
  drawMenuButton(bx, by3, bw, bh, recipesLabel, menuHover === 'recipes');
  drawMenuButton(bx, by4, bw, bh, 'INTRO & CREDITS', menuHover === 'intro');

  // Nickname display under buttons
  if (playerNickname) {
    outText('Giocatore: ' + playerNickname, canvas.width / 2, by4 + bh + 18, '#ffcc88', 'bold 13px "Courier New", monospace', 'center');
    outText('(cambia)', canvas.width / 2, by4 + bh + 34, '#ff8855', 'bold 12px "Courier New", monospace', 'center');
    btnChangeNick = { x: canvas.width / 2 - 40, y: by4 + bh + 24, w: 80, h: 16 };
  } else {
    btnChangeNick = { x: 0, y: 0, w: 0, h: 0 };
  }

  // High score
  if (highScore > 0) {
    const hsY = playerNickname ? by4 + bh + 52 : by4 + bh + 22;
    outText('Record: ' + highScore, canvas.width / 2, hsY, '#ffee55', 'bold 16px "Courier New", monospace', 'center');
  }

  // Hint
  const hintY = playerNickname ? by4 + bh + 70 : by4 + bh + 44;
  outText('SPAZIO = Juca  |  Sarta cu SPAZIO o tocca', canvas.width / 2, hintY, '#ffffff', 'bold 13px "Courier New", monospace', 'center');

  // Credits
  outText('Realizzato by 2 coglioni durante la festa di Sant\'Agata', canvas.width / 2, canvas.height - 26, '#eebb77', 'bold 11px "Courier New", monospace', 'center');
  outText('@bardimito  @m.molica', canvas.width / 2, canvas.height - 10, '#ffaa66', 'bold 12px "Courier New", monospace', 'center');
}

let recipesScroll = 0;
const RECIPES_PER_PAGE = 3;

function drawRecipes() {
  // Full dark background
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 12;
  outText('RICETTE CATANESI', canvas.width / 2, 38, '#ffdd00', 'bold 28px "Courier New", monospace', 'center');
  ctx.shadowBlur = 0;

  outText(unlockedRecipes.length + '/10 sbloccate', canvas.width / 2, 60, '#ffcc77', 'bold 15px "Courier New", monospace', 'center');

  // Pagination
  const totalPages = Math.ceil(RECIPES.length / RECIPES_PER_PAGE);
  const currentPage = Math.floor(recipesScroll / RECIPES_PER_PAGE);
  const startIdx = currentPage * RECIPES_PER_PAGE;
  const endIdx = Math.min(startIdx + RECIPES_PER_PAGE, RECIPES.length);

  // Recipe cards
  const startY = 78;
  const cardH = 130;
  const cardGap = 10;
  const cardMargin = 40;

  for (let i = startIdx; i < endIdx; i++) {
    const cardIdx = i - startIdx;
    const cy = startY + cardIdx * (cardH + cardGap);
    const unlocked = unlockedRecipes.includes(RECIPES[i].id);

    // Card background
    ctx.fillStyle = unlocked ? 'rgba(218,165,32,0.12)' : 'rgba(80,80,80,0.12)';
    ctx.fillRect(cardMargin, cy, canvas.width - cardMargin * 2, cardH);
    ctx.strokeStyle = unlocked ? 'rgba(218,165,32,0.4)' : 'rgba(100,100,100,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(cardMargin, cy, canvas.width - cardMargin * 2, cardH);

    if (unlocked) {
      // Number + name
      outText((i + 1) + '. ' + RECIPES[i].name, canvas.width / 2, cy + 20, '#ffdd44', 'bold 16px "Courier New", monospace', 'center');
      // Ingredients line
      outText(RECIPES[i].desc, canvas.width / 2, cy + 40, '#ffcc88', 'bold 12px "Courier New", monospace', 'center');
      // Preparation - wrap text
      ctx.font = '11px "Courier New", monospace';
      const maxW = canvas.width - cardMargin * 2 - 30;
      const words = RECIPES[i].steps.split(' ');
      let line = '';
      let lineY = cy + 58;
      for (const word of words) {
        const test = line + (line ? ' ' : '') + word;
        if (ctx.measureText(test).width > maxW && line) {
          outText(line, canvas.width / 2, lineY, '#ddccaa', '11px "Courier New", monospace', 'center');
          line = word;
          lineY += 14;
          if (lineY > cy + cardH - 8) break;
        } else {
          line = test;
        }
      }
      if (line && lineY <= cy + cardH - 8) {
        outText(line, canvas.width / 2, lineY, '#ddccaa', '11px "Courier New", monospace', 'center');
      }
    } else {
      // Locked recipe
      outText((i + 1) + '. ??? RICETTA SEGRETA ???', canvas.width / 2, cy + cardH / 2 - 6, '#777777', 'bold 16px "Courier New", monospace', 'center');
      const rangeText = 'Sblocca tra ' + RECIPES[i].minScore + ' e ' + RECIPES[i].maxScore + ' punti';
      outText(rangeText, canvas.width / 2, cy + cardH / 2 + 14, '#666666', 'bold 12px "Courier New", monospace', 'center');
    }
  }

  // Pagination controls
  const navY = startY + RECIPES_PER_PAGE * (cardH + cardGap) + 8;
  const pageText = (currentPage + 1) + '/' + totalPages;
  outText(pageText, canvas.width / 2, navY + 16, '#ffffff', 'bold 16px "Courier New", monospace', 'center');

  // Prev / Next buttons
  const arrowW = 60, arrowH = 32;
  const prevX = canvas.width / 2 - 120, nextX = canvas.width / 2 + 60;
  btnRecipesPrev = { x: prevX, y: navY, w: arrowW, h: arrowH };
  btnRecipesNext = { x: nextX, y: navY, w: arrowW, h: arrowH };

  if (currentPage > 0) {
    drawMenuButton(prevX, navY, arrowW, arrowH, '<', false);
  }
  if (currentPage < totalPages - 1) {
    drawMenuButton(nextX, navY, arrowW, arrowH, '>', false);
  }

  // Back button
  const bbw = 180, bbh = 38;
  const bbx = canvas.width / 2 - bbw / 2;
  const bby = navY + arrowH + 12;
  btnRecipesBack = { x: bbx, y: bby, w: bbw, h: bbh };
  drawMenuButton(bbx, bby, bbw, bbh, 'MENU', false);
}

function drawLeaderboard() {
  // Dark background
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title with glow
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 15;
  outText('CLASSIFICA', canvas.width / 2, 50, '#ffcc00', 'bold 32px "Courier New", monospace', 'center');
  ctx.shadowBlur = 0;

  outText('Top 5 Giocatori', canvas.width / 2, 76, '#ffa866', 'bold 15px "Courier New", monospace', 'center');

  if (leaderboardLoading) {
    outText('Caricamento...', canvas.width / 2, 180, '#ffffff', 'bold 18px "Courier New", monospace', 'center');
  } else if (leaderboardData.length === 0) {
    outText('Nessun punteggio ancora!', canvas.width / 2, 180, '#888888', 'bold 16px "Courier New", monospace', 'center');
  } else {
    const startY = 110;
    const rowH = 56;
    const colors = ['#ffd700', '#c0c0c0', '#cd7f32', '#ffffff', '#ffffff'];
    const labels = ['1°', '2°', '3°', '4°', '5°'];

    for (let i = 0; i < leaderboardData.length && i < 5; i++) {
      const entry = leaderboardData[i];
      const ry = startY + i * rowH;

      // Row background
      ctx.fillStyle = i < 3 ? 'rgba(218,165,32,0.08)' : 'rgba(80,80,80,0.08)';
      ctx.fillRect(80, ry, canvas.width - 160, rowH - 6);
      ctx.strokeStyle = i < 3 ? 'rgba(218,165,32,0.3)' : 'rgba(100,100,100,0.2)';
      ctx.lineWidth = 1;
      ctx.strokeRect(80, ry, canvas.width - 160, rowH - 6);

      // Position
      outText(labels[i], 120, ry + 32, colors[i], 'bold 22px "Courier New", monospace', 'center');

      // Nickname
      outText(entry.nickname || '???', canvas.width / 2 - 40, ry + 32, colors[i], 'bold 20px "Courier New", monospace', 'left');

      // Score
      outText(String(entry.score), canvas.width - 140, ry + 32, colors[i], 'bold 20px "Courier New", monospace', 'right');
    }
  }

  // MENU button
  const bbw = 180, bbh = 38;
  const bbx = canvas.width / 2 - bbw / 2;
  const bby = canvas.height - 70;
  btnLeaderboardBack = { x: bbx, y: bby, w: bbw, h: bbh };
  drawMenuButton(bbx, bby, bbw, bbh, 'MENU', false);
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bx = canvas.width / 2 - 175;
  const by = 50;
  ctx.fillStyle = '#1a0a0a';
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth = 3;
  ctx.fillRect(bx, by, 350, 240);
  ctx.strokeRect(bx, by, 350, 240);

  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = frameCount % 20 < 10 ? 20 : 5;
  outText('MINCHIA!', canvas.width / 2, by + 35, '#ff4400', 'bold 32px "Courier New", monospace', 'center');
  ctx.shadowBlur = 0;

  outText('U cavaddu si stummuliau!', canvas.width / 2, by + 58, '#ffe0c0', '14px "Courier New", monospace', 'center');

  // Beer spilled
  ctx.fillStyle = '#daa520';
  ctx.fillRect(canvas.width / 2 - 8, by + 66, 16, 20);
  ctx.fillStyle = '#fffff0';
  ctx.fillRect(canvas.width / 2 - 8, by + 64, 16, 4);
  ctx.fillStyle = '#e8a020';
  ctx.fillRect(canvas.width / 2 + 10, by + 76, 8, 4);
  ctx.fillRect(canvas.width / 2 + 14, by + 80, 6, 3);

  outText('Punteggio: ' + score, canvas.width / 2, by + 105, '#fff', 'bold 20px "Courier New", monospace', 'center');

  outText('Record: ' + highScore, canvas.width / 2, by + 125, '#ffdd44', 'bold 16px "Courier New", monospace', 'center');

  // Gamification stats
  outText('Rank: ' + currentRank, canvas.width / 2, by + 148, '#55ffee', 'bold 14px "Courier New", monospace', 'center');

  const statsText = 'Arancini: ' + aranciniCollected + '  |  Best streak: ' + bestStreak;
  outText(statsText, canvas.width / 2, by + 166, '#ffdd44', 'bold 13px "Courier New", monospace', 'center');

  if (recordBroken) {
    outText('NUOVO RECORD!!!', canvas.width / 2, by + 190, '#ffdd00', 'bold 16px "Courier New", monospace', 'center');
  }

  outText('SPAZIO pi ricominciare', canvas.width / 2, by + 218, '#ffffff', 'bold 14px "Courier New", monospace', 'center');
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (gameState === 'menu') { drawMenu(); ScreenFade.draw(ctx, canvas.width, canvas.height); return; }
  if (gameState === 'leaderboard') { drawLeaderboard(); ScreenFade.draw(ctx, canvas.width, canvas.height); return; }
  if (gameState === 'recipes') { drawRecipes(); ScreenFade.draw(ctx, canvas.width, canvas.height); return; }
  ParallaxBg.draw(ctx, canvas.width, bgH);
  drawGround();
  drawAranciniSprites();
  drawHorseSprite();
  drawObstacles();
  // --- Boss rendering ---
  if (boss) {
    drawLiotru(boss.x, boss.y, animFrame);
    for (let i = 0; i < bossLavas.length; i++) {
      drawLava(bossLavas[i].x, bossLavas[i].y);
    }
    // Boss intro text with glow
    if (bossIntroTimer > 0) {
      ctx.globalAlpha = Math.min(1, bossIntroTimer / 20);
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 20;
      outText('U LIOTRU!!!', canvas.width / 2, canvas.height / 2 - 60, '#ff4400', 'bold 36px "Courier New", monospace', 'center');
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }
  drawScore();
  drawFloatingTexts();
  drawRankCelebration();
  if (gameState === 'gameover') drawGameOverScreen();
  // ScreenFade drawn last — overlays everything
  ScreenFade.draw(ctx, canvas.width, canvas.height);
}

let lastTime = 0;
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const elapsed = timestamp - lastTime;
  lastTime = timestamp;
  // dt = 1.0 at 60fps (16.67ms), scales up if slower
  const dt = Math.min(elapsed / 16.667, 3); // cap at 3x to avoid tunneling
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}
AudioManager.init();
fetchLeaderboard();
requestAnimationFrame(gameLoop);
</script>
