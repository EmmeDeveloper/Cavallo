const entities = [

  { name: 'Horse (jump)', key: 'horse_jump', hitW: 44, hitH: 62, sprW: 55, sprH: 78, note: 'PixelLab 48x48 | hitbox 80%' },
  { name: 'Boss (idle)', key: 'boss_idle', hitW: 99, hitH: 81, sprW: 132, sprH: 108, note: 'gen 132x108 | hitbox 75%' },
  { name: 'Boss (charge)', key: 'boss_charge', hitW: 99, hitH: 81, sprW: 132, sprH: 108, note: 'gen 132x108 | hitbox 75%' },
  { name: 'Boss (flash)', key: 'boss_flash', hitW: 99, hitH: 81, sprW: 132, sprH: 108, note: 'gen 132x108 | hitbox 75%' },
  { name: 'Arancino', key: 'arancino', hitW: 16, hitH: 16, note: 'gen 16x16' },
  { name: 'Fornacella 1', key: 'fornacella1', hitW: 20, hitH: 27, sprW: 27, sprH: 36, note: 'gen 27x36 | hitbox 75%' },
  { name: 'Fornacella 2', key: 'fornacella2', hitW: 23, hitH: 30, sprW: 30, sprH: 40, note: 'gen 30x40 | hitbox 75%' },
  { name: 'Fornacella Grill', key: 'fornacella_grill', hitW: 27, hitH: 45, sprW: 36, sprH: 60, note: 'gen 36x60 | hitbox 75%' },
  { name: 'Maf Coltello', key: 'maf_coltello', hitW: 25, hitH: 47, sprW: 33, sprH: 63, note: 'gen 33x63 | hitbox 75%' },
  { name: 'Maf Lupara', key: 'maf_lupara', hitW: 27, hitH: 54, sprW: 36, sprH: 72, note: 'gen 36x72 | hitbox 75%' },
  { name: 'Maf Fornacella', key: 'maf_fornacella', hitW: 25, hitH: 63, sprW: 33, sprH: 84, note: 'gen 33x84 | hitbox 75%' },
  { name: 'Lava', key: 'lava', hitW: 12, hitH: 12, sprW: 20, sprH: 20, note: 'gen 20x20 | hitbox 60%' },
];

const grid = document.getElementById('grid');

entities.forEach(e => {
  const card = document.createElement('div');
  card.className = 'card';

  const img = new Image();
  img.src = SPRITE_DATA[e.key];
  img.onload = () => {
    const cw = Math.max(e.hitW, img.width) * SCALE + 40;
    const ch = Math.max(e.hitH, img.height) * SCALE + 40;
    const cvs = document.createElement('canvas');
    cvs.width = cw;
    cvs.height = ch;
    const ctx = cvs.getContext('2d');

    ctx.imageSmoothingEnabled = false;

    // Draw sprite at hitbox dimensions (how game renders it)
    const sx = (cw - e.hitW * SCALE) / 2;
    const sy = ch - e.hitH * SCALE - 10;
    ctx.drawImage(img, sx, sy, e.hitW * SCALE, e.hitH * SCALE);

    // Purple hitbox outline
    ctx.strokeStyle = '#aa00ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, e.hitW * SCALE, e.hitH * SCALE);

    // Ground line (green)
    ctx.strokeStyle = '#00ff44';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(0, sy + e.hitH * SCALE);
    ctx.lineTo(cw, sy + e.hitH * SCALE);
    ctx.stroke();
    ctx.setLineDash([]);

    const h3 = document.createElement('h3');
    h3.textContent = e.name;
    card.appendChild(h3);
    card.appendChild(cvs);
    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = 'Sprite: ' + img.width + 'x' + img.height + 'px | Hitbox: ' + e.hitW + 'x' + e.hitH + 'px<br>' + e.note;
    card.appendChild(info);

    grid.appendChild(card);
  };
});
